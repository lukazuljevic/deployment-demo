services:
  web:
    build:
      context: .
      dockerfile: ./services/web/Dockerfile
    ports:
      - "80:80"

  backend:
    build:
      context: .
      dockerfile: ./services/api/Dockerfile

    env_file:
      - ./services/api/.env.production

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - backend_network

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Cart

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - backend_network

    ports:
      - 5432:5432

volumes:
  db_data:

networks:
  backend_network:
    driver: bridge
